name: forensics-sandbox-offline

services:
  analysis:
    build:
      context: .
      dockerfile: Containerfile
    image: ${FORENSIC_IMAGE:-forensics-sandbox:latest}
    network_mode: none
    read_only: true
    pids_limit: 1024
    cpus: 2
    mem_limit: 2g
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=2g
      - /analysis:rw,noexec,nosuid,nodev,size=1g
    volumes:
      - ./artifacts:/analysis/output:rw
    stdin_open: true
    tty: true
    command: ["/bin/bash"]
