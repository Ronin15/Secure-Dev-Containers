name: forensics-sandbox-egress

services:
  proxy:
    build:
      context: .
      dockerfile: Containerfile.proxy
    image: ${FORENSIC_PROXY_IMAGE:-forensics-squid-proxy:latest}
    container_name: forensics-proxy
    hostname: forensics-proxy
    networks:
      forensics-egress:
        aliases:
          - proxy
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/log/squid:rw,noexec,nosuid,nodev,size=1g
      - /var/spool/squid:rw,noexec,nosuid,nodev,size=2g

  analysis:
    build:
      context: .
      dockerfile: Containerfile
    image: ${FORENSIC_IMAGE:-forensics-sandbox:latest}
    depends_on:
      - proxy
    networks:
      - forensics-egress
    read_only: true
    pids_limit: 1024
    cpus: 2
    mem_limit: 2g
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=2g
      - /analysis:rw,noexec,nosuid,nodev,size=1g
    volumes:
      - ./artifacts:/analysis/output:rw
    environment:
      http_proxy: http://proxy:3128
      https_proxy: http://proxy:3128
      ALL_PROXY: http://proxy:3128
    stdin_open: true
    tty: true
    command: ["/bin/bash"]

networks:
  forensics-egress:
    name: forensics-egress
